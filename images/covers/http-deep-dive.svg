<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#3fb950"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <g opacity="0.08" stroke="#58a6ff" stroke-width="0.5">
    <line x1="0" y1="50" x2="800" y2="50"/><line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/><line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="400"/><line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/><line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/><line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
  </g>
  <!-- Packet flow visualization -->
  <g>
    <rect x="80" y="140" width="140" height="50" rx="6" fill="none" stroke="#58a6ff" stroke-width="1.5" opacity="0.8"/>
    <text x="150" y="160" text-anchor="middle" fill="#58a6ff" font-size="11" font-family="monospace">HTTP/1.1</text>
    <text x="150" y="178" text-anchor="middle" fill="#8b949e" font-size="9" font-family="monospace">串行 · 队头阻塞</text>
    <rect x="260" y="140" width="120" height="50" rx="6" fill="none" stroke="#3fb950" stroke-width="1.5" opacity="0.8"/>
    <text x="320" y="160" text-anchor="middle" fill="#3fb950" font-size="11" font-family="monospace">HTTP/2</text>
    <text x="320" y="178" text-anchor="middle" fill="#8b949e" font-size="9" font-family="monospace">多路复用 · 二进制</text>
    <rect x="420" y="140" width="120" height="50" rx="6" fill="none" stroke="#f0883e" stroke-width="1.5" opacity="0.8"/>
    <text x="480" y="160" text-anchor="middle" fill="#f0883e" font-size="11" font-family="monospace">HTTP/3</text>
    <text x="480" y="178" text-anchor="middle" fill="#8b949e" font-size="9" font-family="monospace">QUIC · UDP</text>
    <!-- Arrows -->
    <path d="M225,165 L255,165" stroke="#8b949e" stroke-width="1" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M385,165 L415,165" stroke="#8b949e" stroke-width="1" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  <defs><marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#8b949e"/></marker></defs>
  <!-- Request/Response packets -->
  <g opacity="0.6">
    <rect x="130" y="220" width="80" height="28" rx="14" fill="#58a6ff" opacity="0.15"/>
    <text x="170" y="239" text-anchor="middle" fill="#58a6ff" font-size="10" font-family="monospace">REQ →</text>
    <rect x="240" y="220" width="80" height="28" rx="14" fill="#3fb950" opacity="0.15"/>
    <text x="280" y="239" text-anchor="middle" fill="#3fb950" font-size="10" font-family="monospace">← RES</text>
    <rect x="350" y="220" width="80" height="28" rx="14" fill="#58a6ff" opacity="0.15"/>
    <text x="390" y="239" text-anchor="middle" fill="#58a6ff" font-size="10" font-family="monospace">REQ →</text>
    <rect x="460" y="220" width="80" height="28" rx="14" fill="#3fb950" opacity="0.15"/>
    <text x="500" y="239" text-anchor="middle" fill="#3fb950" font-size="10" font-family="monospace">← RES</text>
  </g>
  <text x="400" y="310" text-anchor="middle" fill="#ffffff" font-size="28" font-family="sans-serif" font-weight="bold">深入理解 HTTP</text>
  <text x="400" y="345" text-anchor="middle" fill="#8b949e" font-size="14" font-family="sans-serif">协议演进 · 报文细节 · 缓存机制</text>
  <rect x="300" y="365" width="200" height="2" fill="url(#accent)" rx="1"/>
</svg>