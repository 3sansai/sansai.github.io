<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#334155"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <rect x="150" y="60" width="500" height="180" rx="8" fill="rgba(0,0,0,0.3)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <text x="180" y="100" font-family="monospace" font-size="18" fill="#4ade80">$ ls -la</text>
  <text x="180" y="130" font-family="monospace" font-size="18" fill="#f8fafc">total 48</text>
  <text x="180" y="160" font-family="monospace" font-size="18" fill="#38bdf8">drwxr-xr-x  user group  /home</text>
  <text x="180" y="190" font-family="monospace" font-size="18" fill="#f8fafc">-rw-r--r--  user group  file.txt</text>
  <text x="400" y="300" font-family="system-ui, sans-serif" font-size="52" fill="#fff" text-anchor="middle" font-weight="bold">Linux 命令手册</text>
  <text x="400" y="340" font-family="system-ui, sans-serif" font-size="22" fill="rgba(255,255,255,0.6)" text-anchor="middle">从基础到进阶的常用命令</text>
</svg>
