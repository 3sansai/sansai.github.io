<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <g opacity="0.08" stroke="#e94560" stroke-width="0.5">
    <line x1="0" y1="50" x2="800" y2="50"/><line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/><line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="400"/><line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/><line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/><line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
  </g>
  <!-- Client-Server connection -->
  <g>
    <!-- Client -->
    <rect x="100" y="130" width="100" height="80" rx="10" fill="#0f3460" opacity="0.8" stroke="#e94560" stroke-width="1.5"/>
    <text x="150" y="165" text-anchor="middle" fill="#e94560" font-size="13" font-family="sans-serif" font-weight="bold">Client</text>
    <text x="150" y="185" text-anchor="middle" fill="#8b949e" font-size="10" font-family="monospace">Socket</text>
    <!-- Server -->
    <rect x="500" y="130" width="100" height="80" rx="10" fill="#0f3460" opacity="0.8" stroke="#e94560" stroke-width="1.5"/>
    <text x="550" y="165" text-anchor="middle" fill="#e94560" font-size="13" font-family="sans-serif" font-weight="bold">Server</text>
    <text x="550" y="185" text-anchor="middle" fill="#8b949e" font-size="10" font-family="monospace">ServerSocket</text>
    <!-- Connection line -->
    <line x1="200" y1="170" x2="500" y2="170" stroke="#e94560" stroke-width="2" stroke-dasharray="8,4" opacity="0.7"/>
    <text x="350" y="160" text-anchor="middle" fill="#e94560" font-size="11" font-family="monospace">TCP Connection</text>
    <!-- Data packets -->
    <rect x="250" y="210" width="60" height="24" rx="12" fill="#e94560" opacity="0.2"/>
    <text x="280" y="227" text-anchor="middle" fill="#e94560" font-size="9" font-family="monospace">DATA →</text>
    <rect x="340" y="210" width="60" height="24" rx="12" fill="#58a6ff" opacity="0.2"/>
    <text x="370" y="227" text-anchor="middle" fill="#58a6ff" font-size="9" font-family="monospace">← ACK</text>
  </g>
  <!-- Three-way handshake -->
  <g opacity="0.5">
    <text x="150" y="270" text-anchor="middle" fill="#8b949e" font-size="10" font-family="monospace">SYN</text>
    <path d="M180,275 L350,275" stroke="#e94560" stroke-width="1" fill="none" marker-end="url(#arr)"/>
    <text x="350" y="295" text-anchor="middle" fill="#8b949e" font-size="10" font-family="monospace">SYN+ACK</text>
    <path d="M350,300 L180,300" stroke="#58a6ff" stroke-width="1" fill="none" marker-end="url(#arr2)"/>
    <text x="150" y="325" text-anchor="middle" fill="#8b949e" font-size="10" font-family="monospace">ACK</text>
    <path d="M180,320 L350,320" stroke="#3fb950" stroke-width="1" fill="none" marker-end="url(#arr3)"/>
  </g>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#e94560"/></marker>
    <marker id="arr2" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto"><polygon points="8 0,0 3,8 6" fill="#58a6ff"/></marker>
    <marker id="arr3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#3fb950"/></marker>
  </defs>
  <text x="400" y="345" text-anchor="middle" fill="#ffffff" font-size="28" font-family="sans-serif" font-weight="bold">Socket 通讯</text>
  <text x="400" y="375" text-anchor="middle" fill="#8b949e" font-size="14" font-family="sans-serif">从原理到 Java 实战</text>
  <rect x="300" y="388" width="200" height="2" fill="url(#accent)" rx="1"/>
</svg>